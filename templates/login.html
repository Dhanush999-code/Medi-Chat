<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medi-Chat | Login</title>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="floating-icons">
      <i class="fa fa-pills"></i><i class="fa fa-heartbeat"></i>
      <i class="fa fa-stethoscope"></i><i class="fa fa-hospital"></i>
      <i class="fa fa-capsules"></i><i class="fa fa-syringe"></i>
    </div>
    <div class="auth-card">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon">
          <i class="fa fa-comment-medical"></i>
        </div>
        <h1 class="logo-name">Medi<span>Chat</span></h1>
        <p class="logo-tagline">Your AI-Powered Medical Assistant</p>
        <p class="logo-desc">Get instant medical guidance, analyze medicines, verify bills, and more — all in one place.</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab" class="tab-content active">
        <div class="form-group">
          <label><i class="fa fa-envelope"></i> Email</label>
          <input type="email" id="login-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label><i class="fa fa-lock"></i> Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" />
        </div>
        <button class="btn-primary" onclick="doLogin()">
          <i class="fa fa-sign-in-alt"></i> Sign In
        </button>
        <div class="demo-hint">
          <i class="fa fa-info-circle"></i>
          Demo: <strong>demo@medichat.com</strong> / <strong>demo1234</strong>
        </div>
        <div id="login-error" class="error-msg"></div>
      </div>

      <!-- Register Form -->
      <div id="register-tab" class="tab-content">
        <div class="form-row">
          <div class="form-group">
            <label><i class="fa fa-user"></i> Full Name</label>
            <input type="text" id="reg-name" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label><i class="fa fa-birthday-cake"></i> Age</label>
            <input type="number" id="reg-age" placeholder="Age" min="1" max="120" />
          </div>
        </div>
        <div class="form-group">
          <label><i class="fa fa-envelope"></i> Email</label>
          <input type="email" id="reg-email" placeholder="Your email address" />
        </div>
        <div class="form-group">
          <label><i class="fa fa-venus-mars"></i> Gender</label>
          <select id="reg-gender">
            <option value="">Select gender</option>
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fa fa-lock"></i> Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" />
        </div>
        <button class="btn-primary" onclick="doRegister()">
          <i class="fa fa-user-plus"></i> Create Account
        </button>
        <div id="reg-msg" class="error-msg"></div>
      </div>

      <!-- Features preview -->
      <div class="features-preview">
        <div class="feature-chip"><i class="fa fa-pills"></i> Medicine Analysis</div>
        <div class="feature-chip"><i class="fa fa-receipt"></i> Bill Verification</div>
        <div class="feature-chip"><i class="fa fa-file-medical-alt"></i> Complaints</div>
        <div class="feature-chip"><i class="fa fa-robot"></i> AI Assistant</div>
      </div>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      if (!email || !password) { err.textContent = 'Please fill all fields.'; return; }
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (data.success) window.location.href = '/chat';
      else err.textContent = data.message;
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const age = document.getElementById('reg-age').value;
      const gender = document.getElementById('reg-gender').value;
      const msg = document.getElementById('reg-msg');
      if (!name || !email || !password) { msg.textContent = 'Please fill required fields.'; return; }
      const res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, email, password, age, gender})
      });
      const data = await res.json();
      msg.style.color = data.success ? '#00c48c' : '#ff4757';
      msg.textContent = data.message;
      if (data.success) setTimeout(() => showTab('login'), 1500);
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.tab-content.active').id;
        if (active === 'login-tab') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
